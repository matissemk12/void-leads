<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Void — Leads</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0c0c0c;--surface:rgba(255,255,255,.06);--border:rgba(255,255,255,.1);
      --ink:#f2f2f2;--muted:rgba(255,255,255,.65);--dim:rgba(255,255,255,.45);
      --accent:#fff;--ease:cubic-bezier(.4,0,.2,1);
      --new:#3b82f6;--contacted:#f59e0b;--quoted:#8b5cf6;--won:#22c55e;--lost:#ef4444;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    html,body{background:#000;min-height:100%}
    body{color:var(--ink);font-family:'Inter',system-ui,sans-serif;
      font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
    #dotted-bg{position:fixed;inset:0;z-index:0;pointer-events:none}

    a{color:inherit;text-decoration:none}
    button{font-family:inherit;cursor:pointer}
    input,select,textarea{font-family:inherit}

    /* ── layout ── */
    #app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:32px 24px 80px}

    /* ── header ── */
    .hd{position:relative;display:flex;align-items:center;justify-content:center;
      margin-bottom:36px;padding-bottom:0;border-bottom:none}
    .hd-logo{font-size:24px;font-weight:300;letter-spacing:.4em;color:#fff;
      text-transform:uppercase;text-indent:.4em}
    .hd-v{display:none}
    .hd-actions{position:absolute;right:0;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:10px}
    .btn-sm{padding:7px 14px;border:1px solid rgba(255,255,255,.12);border-radius:20px;
      background:transparent;color:rgba(255,255,255,.4);font-size:11px;letter-spacing:.06em;transition:all 180ms}
    .btn-sm:hover{border-color:rgba(255,255,255,.3);color:#fff}

    /* ── url bar (in header) ── */
    #url-bar{display:flex;align-items:center}
    .url-input{width:190px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);
      border-right:none;border-radius:20px 0 0 20px;padding:8px 14px;font-size:12px;color:#fff;outline:none;
      animation:pulse-glow 2.8s ease-in-out infinite;transition:width 300ms ease,background 200ms}
    .url-input:focus{width:240px;background:rgba(255,255,255,.08);animation:none;
      border-color:rgba(255,255,255,.45);box-shadow:0 0 16px rgba(255,255,255,.08)}
    .url-input::placeholder{color:rgba(255,255,255,.25)}
    @keyframes pulse-glow{
      0%,100%{border-color:rgba(255,255,255,.15);box-shadow:none}
      50%{border-color:rgba(255,255,255,.4);box-shadow:0 0 14px rgba(255,255,255,.08)}
    }
    .btn-extract{padding:8px 13px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);
      border:1px solid rgba(255,255,255,.15);border-left:none;
      border-radius:0 20px 20px 0;font-size:14px;line-height:1;
      transition:background 180ms,color 180ms;display:flex;align-items:center;gap:6px}
    .btn-extract:hover{background:rgba(255,255,255,.15);color:#fff}
    .btn-extract:disabled{opacity:.3;cursor:not-allowed}
    .spinner{width:11px;height:11px;border:1.5px solid rgba(255,255,255,.2);
      border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── scraper results (below header) ── */
    #scraper{background:transparent;border:none;padding:0;margin-bottom:0}

    /* ── results ── */
    #results{margin-top:24px;display:none}
    .results-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:18px}
    .rf{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:16px}
    .rf-label{font-size:9px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
    .rf-value{font-size:13px;color:#fff;word-break:break-all;min-height:18px;font-weight:500}
    .rf-value.empty{color:var(--dim);font-style:italic;font-size:11px;font-weight:400}
    .copy-btn{background:none;border:none;color:var(--dim);font-size:10px;letter-spacing:.06em;
      padding:0;margin-top:8px;transition:color 180ms;display:block}
    .copy-btn:hover{color:#fff}
    .results-actions{display:flex;gap:10px;align-items:center;padding-top:4px}
    .btn-save{padding:10px 22px;background:#fff;color:#000;border:none;border-radius:6px;
      font-size:12px;font-weight:600;letter-spacing:.04em;transition:opacity 180ms}
    .btn-save:hover{opacity:.88}
    .btn-clear{padding:10px 16px;background:transparent;border:1px solid rgba(255,255,255,.12);
      border-radius:6px;color:var(--muted);font-size:12px;letter-spacing:.04em;transition:all 180ms}
    .btn-clear:hover{border-color:rgba(255,255,255,.3);color:#fff}
    #err-msg{margin-top:14px;font-size:12px;color:#f87171;letter-spacing:.04em}

    /* ── leads section ── */
    .leads-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .leads-title{font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
    .leads-count{font-size:11px;color:var(--dim);margin-left:8px}
    .filter-row{display:flex;gap:8px;flex-wrap:wrap}
    .filter-btn{padding:5px 12px;border:1px solid var(--border);border-radius:100px;
      background:transparent;color:var(--dim);font-size:11px;letter-spacing:.04em;transition:all 180ms}
    .filter-btn:hover,.filter-btn.active{border-color:rgba(255,255,255,.3);color:var(--ink)}
    .search-in{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:3px;
      padding:6px 12px;color:var(--ink);font-size:12px;width:180px;outline:none;transition:border-color 200ms}
    .search-in:focus{border-color:rgba(255,255,255,.2)}
    .search-in::placeholder{color:var(--dim)}

    /* ── table ── */
    #leads-wrap{overflow-x:auto;margin-top:12px;background:rgba(0,0,0,.6);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:6px;border:1px solid rgba(255,255,255,.08)}
    table{width:100%;border-collapse:collapse}
    thead th{padding:10px 12px;text-align:left;font-size:10px;letter-spacing:.1em;
      color:rgba(255,255,255,.45);text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.08);
      white-space:nowrap;cursor:pointer;user-select:none;background:transparent}
    thead th:hover{color:#fff}
    thead th.sort-asc::after{content:' ↑'}
    thead th.sort-desc::after{content:' ↓'}
    tbody tr{border-bottom:1px solid rgba(255,255,255,.05);transition:background 150ms}
    tbody tr:hover{background:rgba(255,255,255,.04)}
    tbody td{padding:12px 12px;font-size:12px;color:#fff;vertical-align:middle;max-width:200px}
    .td-name{font-weight:500;color:#fff}
    .td-url a{color:rgba(255,255,255,.5);font-size:11px;transition:color 180ms}
    .td-url a:hover{color:#fff}
    .td-contact{font-size:11px;color:rgba(255,255,255,.6);line-height:1.7}
    .td-contact span{display:block}
    .badge{display:inline-block;padding:3px 9px;border-radius:100px;font-size:10px;
      letter-spacing:.06em;font-weight:500;border:1px solid}
    .badge-new      {color:var(--new);border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.08)}
    .badge-contacted{color:var(--contacted);border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.08)}
    .badge-quoted   {color:var(--quoted);border-color:rgba(139,92,246,.3);background:rgba(139,92,246,.08)}
    .badge-won      {color:var(--won);border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.08)}
    .badge-lost     {color:var(--lost);border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.08)}
    tbody tr.row-won {background:rgba(34,197,94,.10)}
    tbody tr.row-lost{background:rgba(239,68,68,.10)}
    .status-sel{background:transparent;border:none;color:inherit;font-size:inherit;
      font-family:inherit;cursor:pointer;outline:none;padding:0;width:100%}
    .td-date{font-size:11px;color:rgba(255,255,255,.45);white-space:nowrap}
    .td-actions{display:flex;gap:6px;align-items:center}
    .icon-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:3px;
      background:transparent;color:var(--dim);display:flex;align-items:center;justify-content:center;
      transition:all 180ms}
    .icon-btn:hover{border-color:rgba(255,255,255,.25);color:var(--ink)}
    .icon-btn.danger:hover{border-color:rgba(248,113,113,.3);color:#f87171}
    .empty-state{padding:60px 0;text-align:center;color:var(--dim);font-size:12px;letter-spacing:.04em}

    /* ── notes modal ── */
    #modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
      display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    #modal-bg.open{display:flex}
    #modal{background:#141414;border:1px solid var(--border);border-radius:6px;
      padding:24px;width:460px;max-width:92vw}
    .modal-title{font-size:13px;font-weight:500;margin-bottom:6px}
    .modal-sub{font-size:11px;color:var(--muted);margin-bottom:18px;letter-spacing:.04em}
    #note-area{width:100%;min-height:120px;background:rgba(255,255,255,.04);
      border:1px solid var(--border);border-radius:3px;padding:12px;
      color:var(--ink);font-size:13px;resize:vertical;outline:none;transition:border-color 200ms}
    #note-area:focus{border-color:rgba(255,255,255,.2)}
    .modal-actions{display:flex;gap:10px;margin-top:14px;justify-content:flex-end}

    @media(max-width:600px){
      .url-row{flex-direction:column}
      .results-grid{grid-template-columns:1fr}
      table{font-size:11px}
      .td-url,.td-date{display:none}
    }
  </style>
</head>
<body>
<div id="dotted-bg"></div>
<div id="app">

  <!-- Header -->
  <div class="hd">
    <div style="position:absolute;left:0;top:50%;transform:translateY(-50%)">
      <div id="url-bar" style="display:flex;align-items:center">
        <input type="text" class="url-input" id="url-in"
          placeholder="website url"
          autocomplete="off" spellcheck="false"
          onkeydown="if(event.key==='Enter')doExtract()">
        <button class="btn-extract" id="extract-btn" onclick="doExtract()">
          <div class="spinner" id="spinner"></div>
          <span id="extract-label">→</span>
        </button>
      </div>
    </div>
    <div class="hd-logo">Void Leads</div>
    <div class="hd-actions">
      <button class="btn-sm" id="find-toggle" onclick="toggleFind()">Find Leads</button>
      <button class="btn-sm" onclick="exportCSV()">Export</button>
    </div>
  </div>

  <!-- Find leads bar -->
  <div id="find-panel" style="display:none;margin-bottom:28px">
    <div id="find-bar" style="display:flex;align-items:center;justify-content:center;gap:0">
      <input type="text" class="url-input" id="find-in"
        placeholder="e.g. plumbers in San Antonio TX"
        style="width:260px"
        autocomplete="off" spellcheck="false"
        onkeydown="if(event.key==='Enter')doFind()">
      <button class="btn-extract" id="find-btn" onclick="doFind()">
        <div class="spinner" id="find-spinner"></div>
        <span id="find-label">→</span>
      </button>
    </div>
    <div id="find-status" style="text-align:center;font-size:11px;color:var(--muted);margin-top:10px;letter-spacing:.04em"></div>
  </div>

  <!-- Results (shown after extract) -->
  <div id="scraper">
    <div id="err-msg"></div>

    <!-- Results -->
    <div id="results">
      <div class="results-grid">
        <div class="rf">
          <div class="rf-label">Business name</div>
          <div class="rf-value" id="r-name"></div>
          <button class="copy-btn" onclick="copy('r-name')">Copy</button>
        </div>
        <div class="rf">
          <div class="rf-label">Phone</div>
          <div class="rf-value" id="r-phone"></div>
          <button class="copy-btn" onclick="copy('r-phone')">Copy</button>
        </div>
        <div class="rf">
          <div class="rf-label">Email</div>
          <div class="rf-value" id="r-email"></div>
          <button class="copy-btn" onclick="copy('r-email')">Copy</button>
        </div>
        <div class="rf">
          <div class="rf-label">Address</div>
          <div class="rf-value" id="r-address"></div>
          <button class="copy-btn" onclick="copy('r-address')">Copy</button>
        </div>
      </div>
      <div class="results-actions">
        <button class="btn-save" onclick="saveLead()">Save lead</button>
        <button class="btn-clear" onclick="clearResults()">Clear</button>
      </div>
    </div>
  </div>

  <!-- Leads list -->
  <div class="leads-header">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span class="leads-title">Leads<span class="leads-count" id="lead-count"></span></span>
      <div class="filter-row" id="filter-row">
        <button class="filter-btn active" data-f="all" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" data-f="New" onclick="setFilter('New',this)">New</button>
        <button class="filter-btn" data-f="Contacted" onclick="setFilter('Contacted',this)">Contacted</button>
        <button class="filter-btn" data-f="Quoted" onclick="setFilter('Quoted',this)">Quoted</button>
        <button class="filter-btn" data-f="Won" onclick="setFilter('Won',this)">Won</button>
        <button class="filter-btn" data-f="Lost" onclick="setFilter('Lost',this)">Lost</button>
      </div>
    </div>
    <input type="text" class="search-in" id="search-in" placeholder="Search…" oninput="renderTable()">
  </div>

  <div id="leads-wrap">
    <table id="leads-table">
      <thead>
        <tr>
          <th onclick="sortBy('name')">Name</th>
          <th onclick="sortBy('phone')">Phone</th>
          <th onclick="sortBy('email')">Email</th>
          <th class="td-url" onclick="sortBy('url')">Website</th>
          <th onclick="sortBy('status')">Status</th>
          <th class="td-date" onclick="sortBy('date')">Added</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty-state" id="empty-state" style="display:none">
      No leads yet — extract one above to get started.
    </div>
  </div>

</div>

<!-- Notes modal -->
<div id="modal-bg" onclick="closeModal(event)">
  <div id="modal">
    <div class="modal-title" id="modal-lead-name"></div>
    <div class="modal-sub">Notes</div>
    <textarea id="note-area" placeholder="Follow-up details, pricing discussed, next steps…"></textarea>
    <div class="modal-actions">
      <button class="btn-clear" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveNote()">Save</button>
    </div>
  </div>
</div>

<script>
  const STORE = 'void_leads_v1';
  let leads = JSON.parse(localStorage.getItem(STORE) || '[]');
  let extracted = null;
  let activeFilter = 'all';
  let sortCol = 'date';
  let sortDir = -1;
  let editingNoteId = null;

  // ── scraper ──
  async function doExtract() {
    const raw = document.getElementById('url-in').value.trim();
    if (!raw) return;
    setLoading(true);
    document.getElementById('err-msg').textContent = '';
    document.getElementById('results').style.display = 'none';

    try {
      const r = await fetch(`/api/scrape?url=${encodeURIComponent(raw)}`);
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Failed');
      extracted = data;
      showResults(data);
    } catch(e) {
      document.getElementById('err-msg').textContent = e.message || 'Could not reach that site.';
    }
    setLoading(false);
  }

  document.getElementById('url-in').addEventListener('keydown', e => { if(e.key==='Enter') doExtract(); });

  function setLoading(on) {
    document.getElementById('extract-btn').disabled = on;
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
    document.getElementById('extract-label').textContent = on ? 'Extracting…' : 'Extract';
  }

  function showResults(d) {
    const set = (id, val, fallback) => {
      const el = document.getElementById(id);
      if(val && val.length) {
        el.textContent = Array.isArray(val) ? val[0] : val;
        el.classList.remove('empty');
      } else {
        el.textContent = fallback;
        el.classList.add('empty');
      }
    };
    set('r-name',    d.name,    'Not found');
set('r-phone',   d.phones,  'Not found');
    set('r-email',   d.emails,  'Not found');
    set('r-address', d.address, 'Not found');
    document.getElementById('results').style.display = 'block';
  }

  function clearResults() {
    extracted = null;
    document.getElementById('results').style.display = 'none';
    document.getElementById('url-in').value = '';
    document.getElementById('err-msg').textContent = '';
  }

  function copy(id) {
    const txt = document.getElementById(id).textContent;
    if(txt && txt !== 'Not found') {
      navigator.clipboard.writeText(txt);
      const btn = document.querySelector(`[onclick="copy('${id}')"]`);
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = orig, 1500);
    }
  }

  // ── leads ──
  function saveLead() {
    if(!extracted) return;
    const lead = {
      id: Date.now().toString(),
      name:    extracted.name || '',
phones:  extracted.phones || [],
      emails:  extracted.emails || [],
      address: extracted.address || '',
      url:     extracted.url || '',
      status:  'New',
      notes:   '',
      date:    new Date().toISOString(),
    };
    leads.unshift(lead);
    save();
    clearResults();
    renderTable();
  }

  function save() {
    localStorage.setItem(STORE, JSON.stringify(leads));
  }

  function deleteLead(id) {
    if(!confirm('Delete this lead?')) return;
    leads = leads.filter(l => l.id !== id);
    save(); renderTable();
  }

  function updateStatus(id, val) {
    const l = leads.find(l => l.id === id);
    if(l) { l.status = val; save(); renderTable(); }
  }

  // ── notes modal ──
  function openNote(id) {
    const l = leads.find(l => l.id === id);
    if(!l) return;
    editingNoteId = id;
    document.getElementById('modal-lead-name').textContent = l.name || l.url;
    document.getElementById('note-area').value = l.notes || '';
    document.getElementById('modal-bg').classList.add('open');
    setTimeout(() => document.getElementById('note-area').focus(), 50);
  }

  function saveNote() {
    const l = leads.find(l => l.id === editingNoteId);
    if(l) { l.notes = document.getElementById('note-area').value; save(); renderTable(); }
    closeModal();
  }

  function closeModal(e) {
    if(e && e.target !== document.getElementById('modal-bg')) return;
    document.getElementById('modal-bg').classList.remove('open');
    editingNoteId = null;
  }

  document.addEventListener('keydown', e => {
    if(e.key === 'Escape') document.getElementById('modal-bg').classList.remove('open');
  });

  // ── filter / sort / render ──
  let _sortCol = 'date', _sortDir = -1;

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  function sortBy(col) {
    if(_sortCol === col) _sortDir *= -1; else { _sortCol = col; _sortDir = 1; }
    document.querySelectorAll('thead th').forEach(th => {
      th.classList.remove('sort-asc','sort-desc');
    });
    const ths = document.querySelectorAll('thead th');
    const cols = ['name','phone','email','url','status','date'];
    const idx = cols.indexOf(col);
    if(idx >= 0 && ths[idx]) ths[idx].classList.add(_sortDir===1?'sort-asc':'sort-desc');
    renderTable();
  }

  function renderTable() {
    const q = document.getElementById('search-in').value.toLowerCase();
    let rows = leads.filter(l => {
      const match = activeFilter === 'all' || l.status === activeFilter;
      if(!match) return false;
      if(!q) return true;
      return (l.name+l.phones.join()+l.emails.join()+l.url+l.notes).toLowerCase().includes(q);
    });

    rows.sort((a, b) => {
      let av = '', bv = '';
      if(_sortCol==='name')   { av=a.name||''; bv=b.name||''; }
      if(_sortCol==='phone')  { av=a.phones[0]||''; bv=b.phones[0]||''; }
      if(_sortCol==='email')  { av=a.emails[0]||''; bv=b.emails[0]||''; }
      if(_sortCol==='url')    { av=a.url||''; bv=b.url||''; }
      if(_sortCol==='status') { av=a.status||''; bv=b.status||''; }
      if(_sortCol==='date')   { av=a.date||''; bv=b.date||''; }
      return av < bv ? -_sortDir : av > bv ? _sortDir : 0;
    });

    const statuses = ['New','Contacted','Quoted','Won','Lost'];
    const tbody = document.getElementById('tbody');

    if(!rows.length) {
      tbody.innerHTML = '';
      document.getElementById('empty-state').style.display = 'block';
    } else {
      document.getElementById('empty-state').style.display = 'none';
      tbody.innerHTML = rows.map(l => {
        const phone = l.phones[0] || '—';
        const email = l.emails[0] || '—';
        const dateStr = l.date ? new Date(l.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
        const host = (() => { try { return new URL(l.url).hostname.replace('www.',''); } catch { return l.url; } })();
        const cls = l.status.toLowerCase().replace(/\s+/g,'');
        const hasNote = l.notes && l.notes.trim().length > 0;

        const opts = statuses.map(s =>
          `<option value="${s}"${s===l.status?' selected':''}>${s}</option>`
        ).join('');

        const rowCls = l.status==='Won' ? ' class="row-won"' : l.status==='Lost' ? ' class="row-lost"' : '';
        return `<tr${rowCls}>
          <td class="td-name">${esc(l.name||'—')}</td>
          <td>${esc(phone)}</td>
          <td style="font-size:11px;color:var(--muted)">${esc(email)}</td>
          <td class="td-url"><a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(host)}</a></td>
          <td>
            <span class="badge badge-${cls}">
              <select class="status-sel" onchange="updateStatus('${l.id}',this.value)">${opts}</select>
            </span>
          </td>
          <td class="td-date">${dateStr}</td>
          <td>
            <div class="td-actions">
              <button class="icon-btn" onclick="openNote('${l.id}')" title="${hasNote?'View notes':'Add notes'}">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ${hasNote?'style="color:#fff"':''}><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              </button>
              <button class="icon-btn danger" onclick="deleteLead('${l.id}')" title="Delete">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              </button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    const total = leads.length;
    const showing = rows.length;
    document.getElementById('lead-count').textContent = total ? ` (${showing === total ? total : `${showing}/${total}`})` : '';
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── export CSV ──
  function exportCSV() {
    if(!leads.length) return;
    const cols = ['Name','Phone','Email','URL','Address','Status','Notes','Date Added'];
    const rows = leads.map(l => [
      l.name, l.phones[0]||'', l.emails[0]||'', l.url, l.address||'',
      l.status, l.notes||'', new Date(l.date).toLocaleDateString()
    ].map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(','));

    const csv = [cols.join(','), ...rows].join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    a.download = `void-leads-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }

  // ── find leads ──
  function toggleFind() {
    const p = document.getElementById('find-panel');
    const open = p.style.display === 'none';
    p.style.display = open ? 'block' : 'none';
    document.getElementById('find-toggle').textContent = open ? 'Close' : 'Find Leads';
    if (open) document.getElementById('find-in').focus();
  }

  async function doFind() {
    const q = document.getElementById('find-in').value.trim();
    if (!q) return;
    const status = document.getElementById('find-status');
    const btn = document.getElementById('find-btn');
    btn.disabled = true;
    document.getElementById('find-spinner').style.display = 'block';
    document.getElementById('find-label').style.display = 'none';
    status.textContent = 'Searching...';

    try {
      const fr = await fetch(`/api/find?q=${encodeURIComponent(q)}`);
      const { urls, error } = await fr.json();
      if (error || !urls || !urls.length) { status.textContent = error || 'No results found.'; return; }

      const existingHosts = new Set(leads.map(l => { try { return new URL(l.url).hostname.replace(/^www\./, ''); } catch { return ''; } }));
      let added = 0;

      for (let i = 0; i < urls.length; i++) {
        status.textContent = `Scraping ${i + 1} / ${urls.length}...`;
        try {
          const host = new URL(urls[i]).hostname.replace(/^www\./, '');
          if (existingHosts.has(host)) continue;
          const sr = await fetch(`/api/scrape?url=${encodeURIComponent(urls[i])}`);
          const d = await sr.json();
          if (!d.error && (d.phones?.length || d.emails?.length)) {
            leads.unshift({ id: Date.now().toString() + i, name: d.name || '', phones: d.phones || [], emails: d.emails || [], address: d.address || '', url: d.url || urls[i], status: 'New', notes: '', date: new Date().toISOString() });
            existingHosts.add(host);
            added++;
            save();
            renderTable();
          }
        } catch {}
      }

      status.textContent = added ? `Done — added ${added} lead${added > 1 ? 's' : ''}.` : 'No new leads found with contact info.';
    } catch {
      status.textContent = 'Search failed.';
    } finally {
      btn.disabled = false;
      document.getElementById('find-spinner').style.display = 'none';
      document.getElementById('find-label').style.display = 'block';
    }
  }

  // ── init ──
  renderTable();
</script>
<script>
(function() {
  const bg = document.getElementById('dotted-bg');
  if (!bg) return;
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'width:100%;height:100%';
  bg.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  const SEP = 150, AX = 40, AY = 60;
  const CAM_Y = 355, CAM_Z = 1220;
  const FOV = Math.PI / 3;
  let count = 0;

  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  (function animate() {
    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const focal = (canvas.height / 2) / Math.tan(FOV / 2);
    const hw = canvas.width / 2, hh = canvas.height / 2;
    ctx.fillStyle = 'rgba(255,255,255,0.8)';

    for (let ix = 0; ix < AX; ix++) {
      for (let iy = 0; iy < AY; iy++) {
        const wx = ix * SEP - (AX * SEP) / 2;
        const wy = Math.sin((ix + count) * 0.3) * 50 + Math.sin((iy + count) * 0.5) * 50;
        const wz = iy * SEP - (AY * SEP) / 2;
        const vz = CAM_Z - wz;
        if (vz <= 1) continue;
        const sx = hw + (wx / vz) * focal;
        const sy = hh - ((wy - CAM_Y) / vz) * focal;
        const r = Math.max(0.3, (8 / vz) * focal);
        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, 6.283);
        ctx.fill();
      }
    }
    count += 0.024;
  })();
})();
</script>
