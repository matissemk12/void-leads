<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Void — Leads</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0c0c0c;--surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);
      --ink:#e8e8e8;--muted:rgba(255,255,255,.35);--dim:rgba(255,255,255,.15);
      --accent:#fff;--ease:cubic-bezier(.4,0,.2,1);
      --new:#3b82f6;--contacted:#f59e0b;--quoted:#8b5cf6;--won:#22c55e;--lost:#6b7280;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    /* ── FallingPattern (exact component translation) ── */
    html{background:#0c0c0c;min-height:100%}
    body{background:transparent;color:var(--ink);font-family:'Inter',system-ui,sans-serif;
      font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;
      position:relative;z-index:0}

    /* Outer wrapper — matches the demo className with mask-image + fade-in */
    #fp-wrap{
      position:fixed;inset:0;z-index:-1;
      opacity:0;
      animation:fp-fadein .2s ease .05s forwards;
    }
    @keyframes fp-fadein{to{opacity:1}}

    /* Animated pattern — matches inner motion.div */
    #fp-bg{
      position:absolute;inset:0;
      background-color:#0c0c0c;
      background-image:
        radial-gradient(4px 100px at 0px 235px,#00ff88,transparent),
        radial-gradient(4px 100px at 300px 235px,#00ff88,transparent),
        radial-gradient(1.5px 1.5px at 150px 117.5px,#00ff88 100%,transparent 150%),
        radial-gradient(4px 100px at 0px 252px,#00ff88,transparent),
        radial-gradient(4px 100px at 300px 252px,#00ff88,transparent),
        radial-gradient(1.5px 1.5px at 150px 126px,#00ff88 100%,transparent 150%),
        radial-gradient(4px 100px at 0px 150px,#00ff88,transparent),
        radial-gradient(4px 100px at 300px 150px,#00ff88,transparent),
        radial-gradient(1.5px 1.5px at 150px 75px,#00ff88 100%,transparent 150%),
        radial-gradient(4px 100px at 0px 253px,#00ff88,transparent),
        radial-gradient(4px 100px at 300px 253px,#00ff88,transparent),
        radial-gradient(1.5px 1.5px at 150px 126.5px,#00ff88 100%,transparent 150%),
        radial-gradient(4px 100px at 0px 204px,#00ff88,transparent),
        radial-gradient(4px 100px at 300px 204px,#00ff88,transparent),
        radial-gradient(1.5px 1.5px at 150px 102px,#00ff88 100%,transparent 150%),
        radial-gradient(4px 100px at 0px 134px,#00ff88,transparent),
        radial-gradient(4px 100px at 300px 134px,#00ff88,transparent),
        radial-gradient(1.5px 1.5px at 150px 67px,#00ff88 100%,transparent 150%),
        radial-gradient(4px 100px at 0px 179px,#00ff88,transparent),
        radial-gradient(4px 100px at 300px 179px,#00ff88,transparent),
        radial-gradient(1.5px 1.5px at 150px 89.5px,#00ff88 100%,transparent 150%),
        radial-gradient(4px 100px at 0px 299px,#00ff88,transparent),
        radial-gradient(4px 100px at 300px 299px,#00ff88,transparent),
        radial-gradient(1.5px 1.5px at 150px 149.5px,#00ff88 100%,transparent 150%),
        radial-gradient(4px 100px at 0px 215px,#00ff88,transparent),
        radial-gradient(4px 100px at 300px 215px,#00ff88,transparent),
        radial-gradient(1.5px 1.5px at 150px 107.5px,#00ff88 100%,transparent 150%),
        radial-gradient(4px 100px at 0px 281px,#00ff88,transparent),
        radial-gradient(4px 100px at 300px 281px,#00ff88,transparent),
        radial-gradient(1.5px 1.5px at 150px 140.5px,#00ff88 100%,transparent 150%),
        radial-gradient(4px 100px at 0px 158px,#00ff88,transparent),
        radial-gradient(4px 100px at 300px 158px,#00ff88,transparent),
        radial-gradient(1.5px 1.5px at 150px 79px,#00ff88 100%,transparent 150%),
        radial-gradient(4px 100px at 0px 210px,#00ff88,transparent),
        radial-gradient(4px 100px at 300px 210px,#00ff88,transparent),
        radial-gradient(1.5px 1.5px at 150px 105px,#00ff88 100%,transparent 150%);
      background-size:
        300px 235px,300px 235px,300px 235px,
        300px 252px,300px 252px,300px 252px,
        300px 150px,300px 150px,300px 150px,
        300px 253px,300px 253px,300px 253px,
        300px 204px,300px 204px,300px 204px,
        300px 134px,300px 134px,300px 134px,
        300px 179px,300px 179px,300px 179px,
        300px 299px,300px 299px,300px 299px,
        300px 215px,300px 215px,300px 215px,
        300px 281px,300px 281px,300px 281px,
        300px 158px,300px 158px,300px 158px,
        300px 210px,300px 210px,300px 210px;
      animation:fp-fall 80s linear infinite;
    }
    @keyframes fp-fall{
      from{background-position:
        0px 220px,3px 220px,151.5px 337.5px,
        25px 24px,28px 24px,176.5px 150px,
        50px 16px,53px 16px,201.5px 91px,
        75px 224px,78px 224px,226.5px 230.5px,
        100px 19px,103px 19px,251.5px 121px,
        125px 120px,128px 120px,276.5px 187px,
        150px 31px,153px 31px,301.5px 120.5px,
        175px 235px,178px 235px,326.5px 384.5px,
        200px 121px,203px 121px,351.5px 228.5px,
        225px 224px,228px 224px,376.5px 364.5px,
        250px 26px,253px 26px,401.5px 105px,
        275px 75px,278px 75px,426.5px 180px;}
      to{background-position:
        0px 6800px,3px 6800px,151.5px 6917.5px,
        25px 13632px,28px 13632px,176.5px 13758px,
        50px 5416px,53px 5416px,201.5px 5491px,
        75px 17175px,78px 17175px,226.5px 17301.5px,
        100px 5119px,103px 5119px,251.5px 5221px,
        125px 8428px,128px 8428px,276.5px 8495px,
        150px 9876px,153px 9876px,301.5px 9965.5px,
        175px 13391px,178px 13391px,326.5px 13540.5px,
        200px 14741px,203px 14741px,351.5px 14848.5px,
        225px 18770px,228px 18770px,376.5px 18910.5px,
        250px 5082px,253px 5082px,401.5px 5161px,
        275px 6375px,278px 6375px,426.5px 6480px;}
    }

    /* Blur+dot overlay — matches the absolute overlay div (blurIntensity=0.5rem, density=2 → 16px) */
    #fp-ol{
      position:absolute;inset:0;z-index:1;
      backdrop-filter:blur(0.5rem);
      -webkit-backdrop-filter:blur(0.5rem);
      background-image:radial-gradient(circle at 50% 50%,transparent 0,transparent 2px,#0c0c0c 2px);
      background-size:16px 16px;
    }
    a{color:inherit;text-decoration:none}
    button{font-family:inherit;cursor:pointer}
    input,select,textarea{font-family:inherit}

    /* ── layout ── */
    #app{max-width:1100px;margin:0 auto;padding:32px 24px 80px}

    /* ── header ── */
    .hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;
      padding-bottom:20px;border-bottom:1px solid var(--border)}
    .hd-logo{display:flex;align-items:center;gap:10px;font-size:12px;letter-spacing:.08em;color:var(--muted)}
    .hd-v{width:22px;height:22px;border:1px solid var(--border);border-radius:3px;
      display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--ink)}
    .hd-actions{display:flex;gap:10px;align-items:center}
    .btn-sm{padding:7px 14px;border:1px solid var(--border);border-radius:3px;
      background:transparent;color:var(--muted);font-size:11px;letter-spacing:.06em;transition:all 180ms}
    .btn-sm:hover{border-color:rgba(255,255,255,.25);color:var(--ink)}

    /* ── scraper ── */
    #scraper{background:var(--surface);border:1px solid var(--border);border-radius:6px;
      padding:24px;margin-bottom:24px}
    .scraper-label{font-size:10px;letter-spacing:.14em;color:var(--muted);
      text-transform:uppercase;margin-bottom:12px}
    .url-row{display:flex;gap:10px}
    .url-input{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);
      border-radius:3px;padding:11px 14px;font-size:13px;color:var(--ink);outline:none;
      transition:border-color 200ms}
    .url-input:focus{border-color:rgba(255,255,255,.25)}
    .url-input::placeholder{color:var(--dim)}
    .btn-extract{padding:11px 22px;background:#fff;color:#0c0c0c;border:none;
      border-radius:3px;font-size:12px;font-weight:500;letter-spacing:.06em;
      transition:opacity 180ms;white-space:nowrap;display:flex;align-items:center;gap:8px}
    .btn-extract:hover{opacity:.88}
    .btn-extract:disabled{opacity:.35;cursor:not-allowed}
    .spinner{width:12px;height:12px;border:1.5px solid rgba(0,0,0,.2);
      border-top-color:#0c0c0c;border-radius:50%;animation:spin .6s linear infinite;display:none}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── results ── */
    #results{margin-top:20px;display:none}
    .results-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
    .rf{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:4px;padding:14px 16px}
    .rf-label{font-size:9px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
    .rf-value{font-size:13px;color:var(--ink);word-break:break-all;min-height:18px}
    .rf-value.empty{color:var(--dim);font-style:italic;font-size:11px}
    .copy-btn{background:none;border:none;color:var(--dim);font-size:10px;letter-spacing:.06em;
      padding:0;margin-top:6px;transition:color 180ms;display:block}
    .copy-btn:hover{color:var(--ink)}
    .results-actions{display:flex;gap:10px;align-items:center}
    .btn-save{padding:10px 22px;background:#fff;color:#0c0c0c;border:none;border-radius:3px;
      font-size:12px;font-weight:500;letter-spacing:.06em;transition:opacity 180ms}
    .btn-save:hover{opacity:.88}
    .btn-clear{padding:10px 16px;background:transparent;border:1px solid var(--border);
      border-radius:3px;color:var(--muted);font-size:12px;letter-spacing:.04em;transition:all 180ms}
    .btn-clear:hover{border-color:rgba(255,255,255,.2);color:var(--ink)}
    #err-msg{margin-top:14px;font-size:12px;color:#f87171;letter-spacing:.04em}

    /* ── leads section ── */
    .leads-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .leads-title{font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
    .leads-count{font-size:11px;color:var(--dim);margin-left:8px}
    .filter-row{display:flex;gap:8px;flex-wrap:wrap}
    .filter-btn{padding:5px 12px;border:1px solid var(--border);border-radius:100px;
      background:transparent;color:var(--dim);font-size:11px;letter-spacing:.04em;transition:all 180ms}
    .filter-btn:hover,.filter-btn.active{border-color:rgba(255,255,255,.3);color:var(--ink)}
    .search-in{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:3px;
      padding:6px 12px;color:var(--ink);font-size:12px;width:180px;outline:none;transition:border-color 200ms}
    .search-in:focus{border-color:rgba(255,255,255,.2)}
    .search-in::placeholder{color:var(--dim)}

    /* ── table ── */
    #leads-wrap{overflow-x:auto;margin-top:12px}
    table{width:100%;border-collapse:collapse}
    thead th{padding:10px 12px;text-align:left;font-size:10px;letter-spacing:.1em;
      color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);
      white-space:nowrap;cursor:pointer;user-select:none}
    thead th:hover{color:var(--ink)}
    thead th.sort-asc::after{content:' ↑'}
    thead th.sort-desc::after{content:' ↓'}
    tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background 150ms}
    tbody tr:hover{background:rgba(255,255,255,.02)}
    tbody td{padding:12px 12px;font-size:12px;color:var(--ink);vertical-align:middle;max-width:200px}
    .td-name{font-weight:500}
    .td-url a{color:var(--dim);font-size:11px;transition:color 180ms}
    .td-url a:hover{color:var(--ink)}
    .td-contact{font-size:11px;color:var(--muted);line-height:1.7}
    .td-contact span{display:block}
    .badge{display:inline-block;padding:3px 9px;border-radius:100px;font-size:10px;
      letter-spacing:.06em;font-weight:500;border:1px solid}
    .badge-new      {color:var(--new);border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.08)}
    .badge-contacted{color:var(--contacted);border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.08)}
    .badge-quoted   {color:var(--quoted);border-color:rgba(139,92,246,.3);background:rgba(139,92,246,.08)}
    .badge-won      {color:var(--won);border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.08)}
    .badge-lost     {color:var(--lost);border-color:rgba(107,114,128,.3);background:rgba(107,114,128,.08)}
    .status-sel{background:transparent;border:none;color:inherit;font-size:inherit;
      font-family:inherit;cursor:pointer;outline:none;padding:0;width:100%}
    .td-date{font-size:11px;color:var(--dim);white-space:nowrap}
    .td-actions{display:flex;gap:6px;align-items:center}
    .icon-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:3px;
      background:transparent;color:var(--dim);display:flex;align-items:center;justify-content:center;
      transition:all 180ms}
    .icon-btn:hover{border-color:rgba(255,255,255,.25);color:var(--ink)}
    .icon-btn.danger:hover{border-color:rgba(248,113,113,.3);color:#f87171}
    .empty-state{padding:60px 0;text-align:center;color:var(--dim);font-size:12px;letter-spacing:.04em}

    /* ── notes modal ── */
    #modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
      display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    #modal-bg.open{display:flex}
    #modal{background:#141414;border:1px solid var(--border);border-radius:6px;
      padding:24px;width:460px;max-width:92vw}
    .modal-title{font-size:13px;font-weight:500;margin-bottom:6px}
    .modal-sub{font-size:11px;color:var(--muted);margin-bottom:18px;letter-spacing:.04em}
    #note-area{width:100%;min-height:120px;background:rgba(255,255,255,.04);
      border:1px solid var(--border);border-radius:3px;padding:12px;
      color:var(--ink);font-size:13px;resize:vertical;outline:none;transition:border-color 200ms}
    #note-area:focus{border-color:rgba(255,255,255,.2)}
    .modal-actions{display:flex;gap:10px;margin-top:14px;justify-content:flex-end}

    @media(max-width:600px){
      .url-row{flex-direction:column}
      .results-grid{grid-template-columns:1fr}
      table{font-size:11px}
      .td-url,.td-date{display:none}
    }
  </style>
</head>
<body>
<div id="fp-wrap">
  <div id="fp-bg"></div>
  <div id="fp-ol"></div>
</div>
<div id="app">

  <!-- Header -->
  <div class="hd">
    <div class="hd-logo">
      <div class="hd-v">V</div>
      Void Leads
    </div>
    <div class="hd-actions">
      <button class="btn-sm" onclick="exportCSV()">Export CSV</button>
    </div>
  </div>

  <!-- Scraper -->
  <div id="scraper">
    <div class="scraper-label">Extract from website</div>
    <div class="url-row">
      <input type="text" class="url-input" id="url-in"
        placeholder="mikes-garage-cleaning.com"
        autocomplete="off" spellcheck="false">
      <button class="btn-extract" id="extract-btn" onclick="doExtract()">
        <div class="spinner" id="spinner"></div>
        <span id="extract-label">Extract</span>
      </button>
    </div>
    <div id="err-msg"></div>

    <!-- Results -->
    <div id="results">
      <div class="results-grid">
        <div class="rf">
          <div class="rf-label">Business name</div>
          <div class="rf-value" id="r-name"></div>
          <button class="copy-btn" onclick="copy('r-name')">Copy</button>
        </div>
        <div class="rf">
          <div class="rf-label">Phone</div>
          <div class="rf-value" id="r-phone"></div>
          <button class="copy-btn" onclick="copy('r-phone')">Copy</button>
        </div>
        <div class="rf">
          <div class="rf-label">Email</div>
          <div class="rf-value" id="r-email"></div>
          <button class="copy-btn" onclick="copy('r-email')">Copy</button>
        </div>
        <div class="rf">
          <div class="rf-label">Address</div>
          <div class="rf-value" id="r-address"></div>
          <button class="copy-btn" onclick="copy('r-address')">Copy</button>
        </div>
      </div>
      <div class="results-actions">
        <button class="btn-save" onclick="saveLead()">Save lead</button>
        <button class="btn-clear" onclick="clearResults()">Clear</button>
      </div>
    </div>
  </div>

  <!-- Leads list -->
  <div class="leads-header">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span class="leads-title">Leads<span class="leads-count" id="lead-count"></span></span>
      <div class="filter-row" id="filter-row">
        <button class="filter-btn active" data-f="all" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" data-f="New" onclick="setFilter('New',this)">New</button>
        <button class="filter-btn" data-f="Contacted" onclick="setFilter('Contacted',this)">Contacted</button>
        <button class="filter-btn" data-f="Quoted" onclick="setFilter('Quoted',this)">Quoted</button>
        <button class="filter-btn" data-f="Won" onclick="setFilter('Won',this)">Won</button>
        <button class="filter-btn" data-f="Lost" onclick="setFilter('Lost',this)">Lost</button>
      </div>
    </div>
    <input type="text" class="search-in" id="search-in" placeholder="Search…" oninput="renderTable()">
  </div>

  <div id="leads-wrap">
    <table id="leads-table">
      <thead>
        <tr>
          <th onclick="sortBy('name')">Name</th>
          <th onclick="sortBy('phone')">Phone</th>
          <th onclick="sortBy('email')">Email</th>
          <th class="td-url" onclick="sortBy('url')">Website</th>
          <th onclick="sortBy('status')">Status</th>
          <th class="td-date" onclick="sortBy('date')">Added</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty-state" id="empty-state" style="display:none">
      No leads yet — extract one above to get started.
    </div>
  </div>

</div>

<!-- Notes modal -->
<div id="modal-bg" onclick="closeModal(event)">
  <div id="modal">
    <div class="modal-title" id="modal-lead-name"></div>
    <div class="modal-sub">Notes</div>
    <textarea id="note-area" placeholder="Follow-up details, pricing discussed, next steps…"></textarea>
    <div class="modal-actions">
      <button class="btn-clear" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveNote()">Save</button>
    </div>
  </div>
</div>

<script>
  const STORE = 'void_leads_v1';
  let leads = JSON.parse(localStorage.getItem(STORE) || '[]');
  let extracted = null;
  let activeFilter = 'all';
  let sortCol = 'date';
  let sortDir = -1;
  let editingNoteId = null;

  // ── scraper ──
  async function doExtract() {
    const raw = document.getElementById('url-in').value.trim();
    if (!raw) return;
    setLoading(true);
    document.getElementById('err-msg').textContent = '';
    document.getElementById('results').style.display = 'none';

    try {
      const r = await fetch(`/api/scrape?url=${encodeURIComponent(raw)}`);
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Failed');
      extracted = data;
      showResults(data);
    } catch(e) {
      document.getElementById('err-msg').textContent = e.message || 'Could not reach that site.';
    }
    setLoading(false);
  }

  document.getElementById('url-in').addEventListener('keydown', e => { if(e.key==='Enter') doExtract(); });

  function setLoading(on) {
    document.getElementById('extract-btn').disabled = on;
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
    document.getElementById('extract-label').textContent = on ? 'Extracting…' : 'Extract';
  }

  function showResults(d) {
    const set = (id, val, fallback) => {
      const el = document.getElementById(id);
      if(val && val.length) {
        el.textContent = Array.isArray(val) ? val[0] : val;
        el.classList.remove('empty');
      } else {
        el.textContent = fallback;
        el.classList.add('empty');
      }
    };
    set('r-name',    d.name,    'Not found');
    set('r-phone',   d.phones,  'Not found');
    set('r-email',   d.emails,  'Not found');
    set('r-address', d.address, 'Not found');
    document.getElementById('results').style.display = 'block';
  }

  function clearResults() {
    extracted = null;
    document.getElementById('results').style.display = 'none';
    document.getElementById('url-in').value = '';
    document.getElementById('err-msg').textContent = '';
  }

  function copy(id) {
    const txt = document.getElementById(id).textContent;
    if(txt && txt !== 'Not found') {
      navigator.clipboard.writeText(txt);
      const btn = document.querySelector(`[onclick="copy('${id}')"]`);
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = orig, 1500);
    }
  }

  // ── leads ──
  function saveLead() {
    if(!extracted) return;
    const lead = {
      id: Date.now().toString(),
      name:    extracted.name || '',
      phones:  extracted.phones || [],
      emails:  extracted.emails || [],
      address: extracted.address || '',
      url:     extracted.url || '',
      status:  'New',
      notes:   '',
      date:    new Date().toISOString(),
    };
    leads.unshift(lead);
    save();
    clearResults();
    renderTable();
  }

  function save() {
    localStorage.setItem(STORE, JSON.stringify(leads));
  }

  function deleteLead(id) {
    if(!confirm('Delete this lead?')) return;
    leads = leads.filter(l => l.id !== id);
    save(); renderTable();
  }

  function updateStatus(id, val) {
    const l = leads.find(l => l.id === id);
    if(l) { l.status = val; save(); renderTable(); }
  }

  // ── notes modal ──
  function openNote(id) {
    const l = leads.find(l => l.id === id);
    if(!l) return;
    editingNoteId = id;
    document.getElementById('modal-lead-name').textContent = l.name || l.url;
    document.getElementById('note-area').value = l.notes || '';
    document.getElementById('modal-bg').classList.add('open');
    setTimeout(() => document.getElementById('note-area').focus(), 50);
  }

  function saveNote() {
    const l = leads.find(l => l.id === editingNoteId);
    if(l) { l.notes = document.getElementById('note-area').value; save(); renderTable(); }
    closeModal();
  }

  function closeModal(e) {
    if(e && e.target !== document.getElementById('modal-bg')) return;
    document.getElementById('modal-bg').classList.remove('open');
    editingNoteId = null;
  }

  document.addEventListener('keydown', e => {
    if(e.key === 'Escape') document.getElementById('modal-bg').classList.remove('open');
  });

  // ── filter / sort / render ──
  let _sortCol = 'date', _sortDir = -1;

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  function sortBy(col) {
    if(_sortCol === col) _sortDir *= -1; else { _sortCol = col; _sortDir = 1; }
    document.querySelectorAll('thead th').forEach(th => {
      th.classList.remove('sort-asc','sort-desc');
    });
    const ths = document.querySelectorAll('thead th');
    const cols = ['name','phone','email','url','status','date'];
    const idx = cols.indexOf(col);
    if(idx >= 0 && ths[idx]) ths[idx].classList.add(_sortDir===1?'sort-asc':'sort-desc');
    renderTable();
  }

  function renderTable() {
    const q = document.getElementById('search-in').value.toLowerCase();
    let rows = leads.filter(l => {
      const match = activeFilter === 'all' || l.status === activeFilter;
      if(!match) return false;
      if(!q) return true;
      return (l.name+l.phones.join()+l.emails.join()+l.url+l.notes).toLowerCase().includes(q);
    });

    rows.sort((a, b) => {
      let av = '', bv = '';
      if(_sortCol==='name')   { av=a.name||''; bv=b.name||''; }
      if(_sortCol==='phone')  { av=a.phones[0]||''; bv=b.phones[0]||''; }
      if(_sortCol==='email')  { av=a.emails[0]||''; bv=b.emails[0]||''; }
      if(_sortCol==='url')    { av=a.url||''; bv=b.url||''; }
      if(_sortCol==='status') { av=a.status||''; bv=b.status||''; }
      if(_sortCol==='date')   { av=a.date||''; bv=b.date||''; }
      return av < bv ? -_sortDir : av > bv ? _sortDir : 0;
    });

    const statuses = ['New','Contacted','Quoted','Won','Lost'];
    const tbody = document.getElementById('tbody');

    if(!rows.length) {
      tbody.innerHTML = '';
      document.getElementById('empty-state').style.display = 'block';
    } else {
      document.getElementById('empty-state').style.display = 'none';
      tbody.innerHTML = rows.map(l => {
        const phone = l.phones[0] || '—';
        const email = l.emails[0] || '—';
        const dateStr = l.date ? new Date(l.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
        const host = (() => { try { return new URL(l.url).hostname.replace('www.',''); } catch { return l.url; } })();
        const cls = l.status.toLowerCase().replace(/\s+/g,'');
        const hasNote = l.notes && l.notes.trim().length > 0;

        const opts = statuses.map(s =>
          `<option value="${s}"${s===l.status?' selected':''}>${s}</option>`
        ).join('');

        return `<tr>
          <td class="td-name">${esc(l.name||'—')}</td>
          <td>${esc(phone)}</td>
          <td style="font-size:11px;color:var(--muted)">${esc(email)}</td>
          <td class="td-url"><a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(host)}</a></td>
          <td>
            <span class="badge badge-${cls}">
              <select class="status-sel" onchange="updateStatus('${l.id}',this.value)">${opts}</select>
            </span>
          </td>
          <td class="td-date">${dateStr}</td>
          <td>
            <div class="td-actions">
              <button class="icon-btn" onclick="openNote('${l.id}')" title="${hasNote?'View notes':'Add notes'}">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ${hasNote?'style="color:#fff"':''}><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              </button>
              <button class="icon-btn danger" onclick="deleteLead('${l.id}')" title="Delete">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              </button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    const total = leads.length;
    const showing = rows.length;
    document.getElementById('lead-count').textContent = total ? ` (${showing === total ? total : `${showing}/${total}`})` : '';
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── export CSV ──
  function exportCSV() {
    if(!leads.length) return;
    const cols = ['Name','Phone','Email','URL','Address','Status','Notes','Date Added'];
    const rows = leads.map(l => [
      l.name, l.phones[0]||'', l.emails[0]||'', l.url, l.address||'',
      l.status, l.notes||'', new Date(l.date).toLocaleDateString()
    ].map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(','));

    const csv = [cols.join(','), ...rows].join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    a.download = `void-leads-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }

  // ── init ──
  renderTable();
</script>
</body>
</html>
